<style>

.syncBtn{height:42px;border-radius:14px;padding:0 15px;border:1px solid rgba(66,133,244,.55);background:linear-gradient(135deg,rgba(66,133,244,.52),rgba(52,168,83,.18));color:#fff;font-weight:600;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.20);}
.syncBtn.connect{display:none;background:linear-gradient(135deg,#1f5fea,#1744a6);border-color:rgba(89,199,255,.72)} body.admin .syncBtn.connect{display:inline-flex;align-items:center;} .syncBtn:hover{filter:brightness(1.08);border-color:rgba(89,199,255,.85)} .syncBtn:disabled{opacity:.55;cursor:not-allowed;}
.syncStatus{min-height:42px;display:inline-flex;align-items:center;border-radius:999px;padding:0 14px;border:1px solid rgba(52,168,83,.55);background:rgba(52,168,83,.10);color:#62f08a;font-size:12px;font-weight:600;white-space:nowrap;}

.section.map{--accent:var(--green)} .section.gdn1{--accent:var(--blue)} .section.gdn2{--accent:var(--purple)}
.sectionHead{display:flex;justify-content:space-between;gap:14px;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line);}
.sectionHead b,.rankHead b{font-weight:600;letter-spacing:.1px;color:#FCFCFC;text-shadow:0 0 7px rgba(252,252,252,.28),0 0 16px rgba(255,255,255,.10);}
.sectionHead b{font-size:18px} .sectionHead span{font-size:12px;color:#9fb2cc;font-weight:500;}
.sectionHead:before{content:"";width:7px;height:28px;border-radius:999px;background:var(--accent);box-shadow:0 0 18px color-mix(in srgb,var(--accent) 50%,transparent);}

.filters{display:grid;grid-template-columns:minmax(110px,.65fr) minmax(140px,.75fr) minmax(210px,1.1fr) minmax(155px,.85fr) minmax(155px,.85fr) minmax(170px,.95fr) minmax(190px,1fr) 138px;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);background:rgba(8,17,31,.72);align-items:end;}
.fg label{display:block;color:#b3c5df;font-size:11px;font-weight:600;letter-spacing:.35px;margin-bottom:7px;}

.fg input:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(66,133,244,.15);}

.toolbar{display:flex;justify-content:flex-start;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(7,17,31,.58);}
.search{width:min(440px,100%);height:42px;background:#07111f;border:1px solid #2b4262;border-radius:999px;color:#fff;padding:0 15px;font-weight:400;outline:none;}
.tableWrap{overflow:visible;background:#07111f;} .tableWrap.scroll-y{max-height:650px;overflow-y:auto;overflow-x:hidden;} .tableWrap::-webkit-scrollbar{width:7px;height:0}.tableWrap::-webkit-scrollbar-thumb{background:rgba(66,133,244,.72);border-radius:999px}.tableWrap::-webkit-scrollbar-track{background:rgba(7,17,31,.45)} table{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed;min-width:0;}
th,td{border-right:1px solid rgba(32,50,77,.82);border-bottom:1px solid rgba(32,50,77,.82);padding:11px 7px;font-size:11.2px;line-height:1.35;vertical-align:middle;text-align:right;word-break:normal;}
th{position:sticky;top:0;z-index:5;background:#0c5e34;color:#fff;font-weight:600;cursor:pointer;user-select:none;box-shadow:0 1px 0 rgba(255,255,255,.08) inset;}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;z-index:3;background:#0a1628;} th:first-child{z-index:7;background:#0c5e34;}
td{background:#0a1424;color:#eef5ff;font-weight:400;} tr:hover td{background:#102038;} tr:hover td:first-child{background:#102038;box-shadow:inset 3px 0 0 var(--accent);}
.campaign{font-weight:400;color:#f2f7ff;text-align:left;white-space:normal;overflow-wrap:anywhere;} .campaign .cellPill{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;line-height:1.35;max-height:3em;justify-content:flex-start;text-align:left;} .num{font-variant-numeric:tabular-nums;} .cellPill{display:inline-flex;justify-content:flex-end;min-width:0;color:#eef5ff!important;font-weight:400;}
tfoot td{position:sticky;bottom:0;z-index:4;background:#0d1e34!important;font-weight:500;color:#fff;border-top:1px solid rgba(89,199,255,.4);} tfoot td:first-child{z-index:6;background:#0d1e34!important;}
.sort{font-size:10px;color:#9ff4bb;margin-left:4px;}
.analysisGrid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:18px;padding:18px;background:rgba(7,17,31,.34);border-top:1px solid var(--line);}

.chartTitle,.analystTitle{font-size:15px;font-weight:600;margin-bottom:4px;color:#FCFCFC;text-shadow:0 0 7px rgba(252,252,252,.20);}
.chartSub,.analystSub{font-size:11.5px;color:var(--muted);margin-bottom:16px;}
.donutWrap{display:grid;grid-template-columns:220px 1fr;gap:22px;align-items:center;}
.donut{width:210px;height:210px;border-radius:50%;position:relative;background:#17243a;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 18px 44px rgba(0,0,0,.22);}
.donut:after{content:"";position:absolute;inset:52px;border-radius:50%;background:#07111f;border:1px solid rgba(94,124,162,.26)}
.donutCenter{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;font-weight:600;color:#FCFCFC;font-variant-numeric:tabular-nums}.donutCenter small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:4px}.donutLegend{display:grid;gap:10px;align-content:center}.donutLi{display:grid;grid-template-columns:12px minmax(0,1fr) auto;gap:9px;align-items:start;font-size:12px;color:#eaf3ff}.donutLi i{width:10px;height:10px;border-radius:50%;margin-top:3px}.donutLi b{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.donutLi small{display:block;color:var(--muted);font-size:10.5px;margin-top:2px}.donutLi strong{font-weight:600;font-variant-numeric:tabular-nums}.analystGrid{display:grid;gap:12px}.analystBlock{border:1px solid rgba(94,124,162,.20);background:rgba(9,21,38,.72);border-radius:15px;padding:13px 14px}.analystBlock b{display:block;font-size:12.5px;margin-bottom:6px}.analystBlock p{margin:0;color:#cddbf0;font-size:12px;line-height:1.62}.analystBlock.good b{color:#61ec86}.analystBlock.warn b{color:#ffd65a}.analystBlock.bad b{color:#ff8178}.analystBlock.action b{color:#74b8ff}
.hbar{display:grid;gap:9px;} .hrow{display:grid;grid-template-columns:minmax(140px,1fr) minmax(100px,2.2fr) 74px;gap:10px;align-items:center;font-size:11.5px;color:#dcecff;}
.hlabel{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;} .track{height:9px;border-radius:999px;background:#1b2a42;overflow:hidden;} .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--accent));} .hvalue{text-align:right;font-variant-numeric:tabular-nums;color:#fff;}

.empty{padding:26px;color:#9fb2cc;text-align:center}

</style>
</head>

function filteredBase(key){return (DATASETS[key]||[]).filter(r=>pass(r,key));}
function filteredAgg(key){let rows=filteredBase(key);let agg=aggregate(rows);const q=state.search[key];if(q)agg=agg.filter(r=>String(r['Chiến dịch']).toLowerCase().includes(q));const s=state.sort[key];if(s.key){agg.sort((a,b)=>{let av=a[s.key],bv=b[s.key];if(typeof av==='string'||typeof bv==='string')return String(av).localeCompare(String(bv),'vi')*(s.dir==='asc'?1:-1);return (num(av)-num(bv))*(s.dir==='asc'?1:-1);})}return agg;}
function colWidth(sectionKey,colKey){const map={
  'Chiến dịch':'22%','Ngân sách':'6%','Lượt nhấp':'6%','Lượt chuyển đổi':'6.8%','Chi phí/lượt chuyển đổi':'7.6%','Tỷ lệ chuyển đổi':'6.5%','Lượt nhấp không hợp lệ':'6.8%','Số lượt hiển thị':'6.6%','Số tương tác':'6.6%','Lượt đến cửa hàng':'6.8%','CTR':'5%','CPC Tr.bình':'6.7%','Chi phí':'6.6%'
};const gdn={
  'Chiến dịch':'25%','Ngân sách':'6.6%','Lượt nhấp':'6.6%','Lượt chuyển đổi':'7%','Chi phí/lượt chuyển đổi':'8.2%','Tỷ lệ chuyển đổi':'6.7%','Lượt nhấp không hợp lệ':'6.8%','Số lượt hiển thị':'7.2%','Số tương tác':'7%','CTR':'5.7%','CPC Tr.bình':'6.8%','Chi phí':'6.4%'
};return (sectionKey==='map'?map:gdn)[colKey]||'7%';}
function renderTable(key,rows){const cols=columnsFor(key);let total={'Chiến dịch':'TỔNG'};cols.forEach(c=>{if(c.key!=='Chiến dịch')total[c.key]=rows.reduce((a,r)=>a+num(r[c.key]),0)});total['Chi phí/lượt chuyển đổi']=total['Lượt chuyển đổi']?total['Chi phí']/total['Lượt chuyển đổi']:0;total['Tỷ lệ chuyển đổi']=total['Lượt nhấp']?total['Lượt chuyển đổi']/total['Lượt nhấp']:0;total['CTR']=total['Số lượt hiển thị']?total['Lượt nhấp']/total['Số lượt hiển thị']:0;total['CPC Tr.bình']=total['Lượt nhấp']?total['Chi phí']/total['Lượt nhấp']:0;const sortState=state.sort[key];let html='<div class="tableWrap '+(rows.length>13?'scroll-y':'')+'"><table><colgroup>'+cols.map(c=>`<col style="width:${colWidth(key,c.key)}">`).join('')+'</colgroup><thead><tr>'+cols.map(c=>`<th data-section="${key}" data-key="${esc(c.key)}">${esc(c.label)} <span class="sort">${sortState.key===c.key?(sortState.dir==='desc'?'↧':'↥'):'↕'}</span></th>`).join('')+'</tr></thead><tbody>';html+=rows.map(r=>'<tr>'+cols.map(c=>`<td class="${c.key==='Chiến dịch'?'campaign':'num'}"><span class="cellPill">${fmtCell(c,r[c.key])}</span></td>`).join('')+'</tr>').join('');html+='</tbody><tfoot><tr>'+cols.map(c=>`<td class="${c.key==='Chiến dịch'?'campaign':'num'}">${fmtCell(c,total[c.key])}</td>`).join('')+'</tr></tfoot></table></div>';$(`table-${key}`).innerHTML=html;document.querySelectorAll(`#table-${key} th`).forEach(th=>th.onclick=()=>{const k=th.dataset.key;const cur=state.sort[key];state.sort[key]=cur.key===k?{key:k,dir:cur.dir==='desc'?'asc':'desc'}:{key:k,dir:'desc'};renderAll();});}
function normer(rows,key,lowerGood=false){let vals=rows.map(r=>num(r[key])).filter(v=>isFinite(v));let min=Math.min(...vals,0),max=Math.max(...vals,0);return r=>{let v=num(r[key]); if(max===min)return .5; let n=(v-min)/(max-min); return lowerGood?1-n:n;}}
function topRank(key,rows,type){if(!rows.length)return[];let cfg=CONFIG[key].goal;let n={conv:normer(rows,'Lượt chuyển đổi'), cvr:normer(rows,'Tỷ lệ chuyển đổi'), cpa:normer(rows,'Chi phí/lượt chuyển đổi',true), store:normer(rows,'Lượt đến cửa hàng'), spend:normer(rows,'Chi phí'), ctr:normer(rows,'CTR'), cpc:normer(rows,'CPC Tr.bình',true), cpcBad:normer(rows,'CPC Tr.bình'), convLow:normer(rows,'Lượt chuyển đổi',true), cvrLow:normer(rows,'Tỷ lệ chuyển đổi',true), ctrLow:normer(rows,'CTR',true), storeLow:normer(rows,'Lượt đến cửa hàng',true)};let scored=rows.map(r=>{let score=0;if(type==='scale'){if(cfg==='store')score=.40*n.store(r)+.30*n.conv(r)+.20*n.cvr(r)+.10*n.cpa(r);else if(cfg==='display')score=.35*n.ctr(r)+.25*n.cpc(r)+.25*n.conv(r)+.15*n.cvr(r);else score=.35*n.conv(r)+.30*n.cvr(r)+.20*n.ctr(r)+.15*n.cpc(r);}else{if(cfg==='store')score=.35*n.spend(r)+.30*n.storeLow(r)+.20*n.convLow(r)+.15*n.cvrLow(r);else if(cfg==='display')score=.35*n.spend(r)+.30*n.ctrLow(r)+.20*n.cpcBad(r)+.15*n.convLow(r);else score=.35*n.spend(r)+.25*n.ctrLow(r)+.20*n.cpcBad(r)+.20*n.convLow(r);}return {...r,score:Math.round(score*100)};}).sort((a,b)=>b.score-a.score);return scored.slice(0,3);}
function insight(key,r,type){const goal=CONFIG[key].goal;if(type==='scale'){if(goal==='store')return `Chiến dịch đang tạo tín hiệu tốt về lượt đến cửa hàng, đồng thời duy trì chuyển đổi và CVR tích cực. Có thể tăng ngân sách từng bước 10–20% để mở rộng lượng khách ghé thăm thực tế, nhưng vẫn cần theo dõi CPA sau khi scale.`;if(goal==='display')return `CTR và CPC cho thấy khả năng thu hút người dùng ổn định, đồng thời chiến dịch vẫn ghi nhận chuyển đổi. Có thể mở rộng phân phối nhưng cần theo dõi chất lượng traffic và tần suất hiển thị.`;return `Chiến dịch có tín hiệu tốt ở cả chuyển đổi, CVR và khả năng thu hút trong phễu dịch vụ. Có thể mở rộng phân phối có kiểm soát để đẩy thêm khách hàng đi sâu hơn trong hành trình dịch vụ.`;}else{if(goal==='store')return `Chiến dịch đang tiêu ngân sách nhưng lượt đến cửa hàng và hiệu quả chuyển đổi chưa tương xứng. Ưu tiên rà soát phạm vi địa lý, tín hiệu vị trí, nội dung quảng cáo và trải nghiệm sau click trước khi tiếp tục tăng ngân sách.`;if(goal==='display')return `Chi phí phân phối đang cao so với khả năng thu hút và tạo chuyển đổi. Nên kiểm tra placement, nhóm đối tượng và mẫu quảng cáo để cải thiện CTR/CPC trước khi mở rộng.`;return `Mức chi tiêu chưa tương xứng với hiệu quả kéo khách đi sâu trong phễu. Nên tối ưu đối tượng, thông điệp dịch vụ, landing page và vị trí hiển thị để cải thiện CTR, CPC và chuyển đổi.`;}}
function renderRank(key,rows){const scale=topRank(key,rows,'scale'), opt=topRank(key,rows,'opt');$('scaleNote-'+key).textContent=key==='map'?'Ưu tiên Store Visits · Conversion · CVR · CPA':key==='gdn1'?'Ưu tiên CTR · CPC · Conversion · CVR':'Ưu tiên Conversion · CVR · CTR · CPC';$('optNote-'+key).textContent=key==='map'?'Chi phí cao · Lượt đến cửa hàng thấp':'Chi phí cao · CTR/CPC yếu · Conversion thấp';function item(r,type,i){let tags=type==='scale'?`<span class="actionTag scale">Scale có kiểm soát</span><span class="actionTag watch">Theo dõi hiệu quả</span>`:`<span class="actionTag opt">Tối ưu</span><span class="actionTag watch">Kiểm soát ngân sách</span>`;if(key==='gdn1')tags+=`<span class="actionTag gdn">Tối ưu placement</span>`;if(key==='gdn2')tags+=`<span class="actionTag purple">Phễu dịch vụ</span>`;return `<div class="rankItem"><div class="rankName">${['🥇','🥈','🥉'][i]} ${esc(r['Chiến dịch'])}</div><div class="rankMetric">${fmtNumber(r['Lượt chuyển đổi'])}<small>Chuyển đổi</small></div><div class="rankMetric">${fmtPct(r['Tỷ lệ chuyển đổi'])}<small>CVR</small></div><div class="rankMetric">${key==='map'?fmtNumber(r['Lượt đến cửa hàng']):fmtPct(r['CTR'])}<small>${key==='map'?'Đến CH':'CTR'}</small></div><div><div class="bar"><i style="width:${Math.max(6,r.score)}%"></i></div><div class="rankMetric"><small>Score ${r.score}%</small></div></div><div class="rankInsight"><div class="rankTags">${tags}</div>${insight(key,r,type)}</div></div>`}
$(`scale-${key}`).innerHTML=scale.length?scale.map((r,i)=>item(r,'scale',i)).join(''):'<div class="empty">Không có dữ liệu phù hợp.</div>';$(`opt-${key}`).innerHTML=opt.length?opt.map((r,i)=>item(r,'opt',i)).join(''):'<div class="empty">Không có dữ liệu phù hợp.</div>';}

function fmtCompact(v){v=num(v);if(v>=1000000000)return (v/1000000000).toLocaleString('vi-VN',{maximumFractionDigits:1})+'B';if(v>=1000000)return (v/1000000).toLocaleString('vi-VN',{maximumFractionDigits:1})+'M';return fmtNumber(v)}
const CHART_COLORS=['#4285F4','#34A853','#FBBC05','#EA4335','#A142F4','#59c7ff','#f06292','#ff8f3d','#7c4dff','#26c6da'];
function distributionRows(key,baseRows){let valueKey=key==='map'?'Lượt đến cửa hàng':'Lượt chuyển đổi';let title=key==='map'?'Phân bổ lượt đến cửa hàng theo khu vực':key==='gdn1'?'Phân bổ Conversion theo khu vực':'Phân bổ Conversion theo phễu dịch vụ';let label=key==='map'?'Đến cửa hàng':'Conversion';let group=r=>key==='gdn2'?(serviceOf(r)||'Khác'):(r['khu vực']||'Khác');let m=new Map();baseRows.forEach(r=>{let k=String(group(r)||'Khác').trim()||'Khác';m.set(k,(m.get(k)||0)+num(r[valueKey]));});let arr=[...m.entries()].map(([name,value])=>({name,value})).filter(x=>x.value>0).sort((a,b)=>b.value-a.value);let total=arr.reduce((a,b)=>a+b.value,0);if(arr.length>8){let other=arr.slice(7).reduce((a,b)=>a+b.value,0);arr=arr.slice(0,7);if(other>0)arr.push({name:'Khác',value:other});}return {arr,total,title,label,valueKey};}
function renderDonut(key,baseRows){const d=distributionRows(key,baseRows);if(!d.total){$(`chart-${key}`).innerHTML=`<div class="chartTitle">${d.title}</div><div class="chartSub">Chưa có dữ liệu trong bộ lọc hiện tại</div><div class="empty">Không có dữ liệu biểu đồ.</div>`;return;}let start=0;let stops=d.arr.map((x,i)=>{let deg=x.value/d.total*360;let seg=`${CHART_COLORS[i%CHART_COLORS.length]} ${start}deg ${start+deg}deg`;start+=deg;return seg;}).join(',');let center=fmtCompact(d.total);$(`chart-${key}`).innerHTML=`<div class="chartTitle">${d.title}</div><div class="chartSub">Dựa trên dữ liệu đang lọc · sắp xếp giảm dần theo đóng góp</div><div class="donutWrap"><div class="donut" style="background:conic-gradient(${stops})"><div class="donutCenter"><span>${center}</span><small>${d.label}</small></div></div><div class="donutLegend">${d.arr.map((x,i)=>`<div class="donutLi"><i style="background:${CHART_COLORS[i%CHART_COLORS.length]}"></i><div><b>${esc(x.name)}</b><small>${fmtNumber(x.value)} · ${fmtPct(x.value/d.total)}</small></div><strong>${fmtPct(x.value/d.total)}</strong></div>`).join('')}</div></div>`;}
function bestWorst(key,rows){const scale=topRank(key,rows,'scale')[0], opt=topRank(key,rows,'opt')[0];return {scale,opt};}
function analystText(key,rows){if(!rows.length)return {overview:'Không có dữ liệu phù hợp với bộ lọc hiện tại.', opp:'Chưa đủ dữ liệu để xác định cơ hội mở rộng.', risk:'Chưa ghi nhận điểm rủi ro nổi bật.', action:'Tiếp tục cập nhật dữ liệu để theo dõi hiệu suất.'};let total={cost:0,conv:0,click:0,store:0,impr:0};rows.forEach(r=>{total.cost+=num(r['Chi phí']);total.conv+=num(r['Lượt chuyển đổi']);total.click+=num(r['Lượt nhấp']);total.store+=num(r['Lượt đến cửa hàng']);total.impr+=num(r['Số lượt hiển thị']);});let cvr=total.click?total.conv/total.click:0, ctr=total.impr?total.click/total.impr:0, cpa=total.conv?total.cost/total.conv:0;const bw=bestWorst(key,rows);const best=bw.scale, risk=bw.opt;if(key==='map')return {overview:`Toàn bộ nhóm MAP đang ghi nhận ${fmtNumber(total.store)} lượt đến cửa hàng, ${fmtNumber(total.conv)} chuyển đổi và CPA bình quân ${fmtMoney(cpa)}. Trọng tâm đánh giá là Store Visits, không chỉ conversion online.`,opp:best?`${esc(best['Chiến dịch'])} là nhóm có tín hiệu mở rộng tốt nhất nhờ kết hợp giữa lượt đến cửa hàng, chuyển đổi và CVR. Có thể tăng ngân sách có kiểm soát nếu CPA không tăng mạnh sau scale.`:'Chưa có campaign nổi bật để scale.',risk:risk?`${esc(risk['Chiến dịch'])} cần được theo dõi vì mức chi tiêu chưa tương xứng với lượt đến cửa hàng/chuyển đổi. Cần rà soát bán kính địa lý, tín hiệu vị trí và nội dung quảng cáo.`:'Chưa có rủi ro rõ ràng.',action:'Ưu tiên phân bổ ngân sách cho khu vực tạo Store Visits tốt, đồng thời giảm nhịp ở nhóm chi cao nhưng lượt đến cửa hàng thấp.'};
if(key==='gdn1')return {overview:`Nhóm GDN 1 đang tạo ${fmtNumber(total.conv)} chuyển đổi với CTR ${fmtPct(ctr)} và CVR ${fmtPct(cvr)}. Mục tiêu chính là duy trì độ phủ, kéo người dùng quay lại phễu nhưng vẫn kiểm soát chất lượng traffic.`,opp:best?`${esc(best['Chiến dịch'])} có tín hiệu thu hút tốt hơn trong nhóm, phù hợp để mở rộng placement/creative nếu CPC vẫn ổn định.`:'Chưa có nhóm đủ tín hiệu mở rộng.',risk:risk?`${esc(risk['Chiến dịch'])} có nguy cơ tiêu ngân sách chưa hiệu quả. Cần kiểm tra placement, tần suất hiển thị và mẫu quảng cáo để cải thiện CTR/CPC.`:'Chưa có rủi ro rõ ràng.',action:'Tập trung tối ưu creative và placement có CTR tốt; loại trừ placement kém chất lượng trước khi tăng ngân sách.'};
return {overview:`Nhóm GDN 2 đang tạo ${fmtNumber(total.conv)} chuyển đổi với CTR ${fmtPct(ctr)} và CVR ${fmtPct(cvr)}. Đây là nhóm phễu dịch vụ nên cần nhìn cả khả năng thu hút lẫn khả năng kéo khách đi sâu hơn.`,opp:best?`${esc(best['Chiến dịch'])} đang là điểm sáng trong phễu dịch vụ. Có thể mở rộng phân phối nếu landing page và thông điệp dịch vụ tiếp tục giữ hiệu quả.`:'Chưa có nhóm đủ tín hiệu mở rộng.',risk:risk?`${esc(risk['Chiến dịch'])} cần tối ưu vì mức chi tiêu/khả năng thu hút chưa tương xứng với chuyển đổi. Nên rà soát tệp đối tượng, thông điệp dịch vụ và landing page.`:'Chưa có rủi ro rõ ràng.',action:'Ưu tiên nhóm dịch vụ có conversion và CVR tốt; tối ưu lại tệp/creative cho nhóm CTR thấp hoặc CPC cao.'};}
function renderAnalyst(key,rows){const a=analystText(key,rows);$(`analyst-${key}`).innerHTML=`<div class="analystTitle">Performance Digital Analyst</div><div class="analystSub">Tổng hợp theo mục tiêu chiến dịch và dữ liệu trong bộ lọc hiện tại</div><div class="analystGrid"><div class="analystBlock good"><b>🟢 Tổng quan hiệu suất</b><p>${a.overview}</p></div><div class="analystBlock warn"><b>🟡 Cơ hội mở rộng</b><p>${a.opp}</p></div><div class="analystBlock bad"><b>🔴 Điểm cần theo dõi</b><p>${a.risk}</p></div><div class="analystBlock action"><b>🎯 Hành động ưu tiên</b><p>${a.action}</p></div></div>`;}
function renderAnalysis(key,aggRows){const base=filteredBase(key);renderDonut(key,base);renderAnalyst(key,aggRows);}

function renderAll(){Object.keys(CONFIG).forEach(k=>{const rows=filteredAgg(k);renderTable(k,rows);renderAnalysis(k,rows);});updateExecBar();}
function updateExecBar(){const f=filters();$('execDate').textContent=(f.from?formatDateVN(f.from):'-')+' → '+(f.to?formatDateVN(f.to):'-');$('execRegion').textContent=f.region||'Tất cả';$('execUpdated').textContent=localStorage.getItem('report_google_brand_last_sync')||'Chưa cập nhật Sheet';$('execSheet').textContent=isSheetConnected()?'Đã kết nối Sheet':'Chưa kết nối Sheet';}
function normalizeRow(r){let o={};Object.keys(r||{}).forEach(k=>{let v=r[k];if(v instanceof Date)v=localYMD(v);o[String(k).trim()]=v;});return o;}
function fetchJsonp(url){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*9999);window[cb]=d=>{delete window[cb];script.remove();resolve(d)};const script=document.createElement('script');script.onerror=()=>{delete window[cb];script.remove();reject(new Error('Không gọi được Apps Script. Kiểm tra quyền Web App hoặc URL.'))};script.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&t='+Date.now();document.body.appendChild(script);})}
function setStatus(txt,cls=''){const el=$('syncStatus');el.textContent=txt;el.className='syncStatus '+cls;}
async function refreshFromSheet(){const url=sheetUrl();if(!url){setStatus('Chưa có link Sheet','bad');if(IS_ADMIN)alert('Bạn cần bấm Kết nối Sheet và dán link Web App Apps Script trước.');return}const btn=$('refreshBtn');btn.disabled=true;setStatus('Đang cập nhật từ Sheet...','warn');try{const payload=await fetchJsonp(url);if(!payload||payload.success===false)throw new Error(payload?.message||'Apps Script không trả dữ liệu hợp lệ.');if(payload.sheets){if(payload.sheets['FILE THÔ'])DATASETS.map=payload.sheets['FILE THÔ'].map(normalizeRow).filter(r=>r['Chiến dịch']);if(payload.sheets['GDN 1'])DATASETS.gdn1=payload.sheets['GDN 1'].map(normalizeRow).filter(r=>r['Chiến dịch']);if(payload.sheets['GDN 2'])DATASETS.gdn2=payload.sheets['GDN 2'].map(normalizeRow).filter(r=>r['Chiến dịch']);}populateFilters();const [a,b]=dateBounds();$('fromDate').value=a;$('toDate').value=b;$('regionFilter').value='';$('serviceFilter').value='';updateDateScopes();renderAll();const syncTime=new Date().toLocaleString('vi-VN');localStorage.setItem('report_google_brand_last_sync',syncTime);setStatus('Đã cập nhật Sheet');}catch(err){console.error(err);setStatus('Lỗi cập nhật Sheet','bad');alert(err.message||'Không cập nhật được dữ liệu.')}finally{btn.disabled=false;updateExecBar();}}
$('connectBtn').onclick=()=>{if(!IS_ADMIN)return;const cur=localStorage.getItem(SHEET_URL_KEY)||DEFAULT_SHEET_URL||'';const url=prompt('Dán link Web App Apps Script kết nối Google Sheet:',cur);if(url!==null){const clean=url.trim();if(clean){localStorage.setItem(SHEET_URL_KEY,clean);}else{localStorage.removeItem(SHEET_URL_KEY);}setStatus(sheetUrl()?'Đã kết nối Sheet':'Chưa kết nối Sheet',sheetUrl()?'':'warn');updateExecBar();}};$('refreshBtn').onclick=refreshFromSheet;
['yearFilter','monthFilter'].forEach(id=>$(id).addEventListener('change',()=>{updateDateScopes();renderAll();}));['fromDate','toDate','regionFilter','serviceFilter'].forEach(id=>$(id).addEventListener('change',()=>{if(id==='fromDate'||id==='toDate')$('dateScope').value='fixed';renderAll();}));$('dateScope').addEventListener('change',()=>{applyDateScope();renderAll();});$('resetBtn').onclick=()=>{$('yearFilter').value='';$('monthFilter').value='';$('dateScope').value='fixed';const [a,b]=dateBounds();$('fromDate').value=a;$('toDate').value=b;$('regionFilter').value='';$('serviceFilter').value='';Object.keys(state.search).forEach(k=>{state.search[k]='';state.sort[k]={key:null,dir:null};const s=$('search-'+k);if(s)s.value='';});renderAll();};
buildShell();populateFilters();const [start,end]=dateBounds();$('fromDate').value=start;$('toDate').value=end;setStatus(isSheetConnected()?'Đã kết nối Sheet':'Chưa kết nối Sheet',isSheetConnected()?'':'warn');renderAll();
</script>
